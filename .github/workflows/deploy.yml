name: CI + Deploy GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test-node-server:
    name: Test Node MCP server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp_servers/node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp_servers/node/package.json
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Run smoke test
        run: npm test

  test-python-server:
    name: Test Python MCP server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp_servers/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: mcp_servers/python/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run smoke test
        run: python test_smoke.py

  validate-openapi:
    name: Validate OpenAPI spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint mcp.yaml with Redocly
        run: npx --yes @redocly/cli@latest lint openapi/mcp.yaml

  deploy-pages:
    name: Deploy site to GitHub Pages
    needs: [test-node-server, test-python-server, validate-openapi]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
